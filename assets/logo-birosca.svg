<svg width="640" height="240" viewBox="0 0 640 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#5f1b00" flood-opacity="0.35"/>
    </filter>
    <filter id="outline">
      <feMorphology operator="dilate" radius="4" in="SourceAlpha" result="thicken"/>
      <feFlood flood-color="white" result="outlineColor"/>
      <feComposite in="outlineColor" in2="thicken" operator="in" result="outline"/>
      <feMerge>
        <feMergeNode in="outline"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="burst" x1="40" y1="20" x2="600" y2="220" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A00"/>
      <stop offset="1" stop-color="#FF5A00"/>
    </linearGradient>
    <linearGradient id="textFill" x1="180" y1="60" x2="360" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B10013"/>
      <stop offset="1" stop-color="#7F0010"/>
    </linearGradient>
  </defs>
  <g filter="url(#shadow)">
    <path d="M69 54L137 69L175 32L224 67L286 25L333 69L398 36L448 80L551 42L531 100L580 128L520 157L539 205L443 188L406 221L347 193L272 217L225 183L165 203L146 165L84 159L113 115L61 94L69 54Z" fill="url(#burst)"/>
  </g>
  <g filter="url(#outline)">
    <text x="118" y="128" font-size="102" font-weight="900" font-style="italic" font-family="Brush Script MT, Segoe Script, cursive" fill="url(#textFill)">Birosca</text>
  </g>
  <g transform="rotate(-8 454 146)" filter="url(#outline)">
    <rect x="378" y="104" width="164" height="72" rx="20" fill="white"/>
    <text x="398" y="154" font-size="46" font-weight="900" font-family="Arial, Helvetica, sans-serif" fill="#1F130F">BURGUER</text>
  </g>
</svg>
